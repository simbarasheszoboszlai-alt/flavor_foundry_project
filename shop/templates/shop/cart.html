<h1>Your Cart</h1>

{% for item in items %}
  <div>
    <p>{{ item.product.name }} - {{ item.quantity }}</p>
    <p>${{ item.total_price }}</p>
    <a href="{% url 'remove_from_cart' item.id %}">Remove</a>
  </div>
{% endfor %}

<h3>Total: ${{ total }}</h3>

<a href="{% url 'checkout' %}">Checkout</a>
<a href="{% url 'home' %}">Continue Shopping</a>
