<h1>{{ product.name }}</h1>

{% if product.image_url %}
  <img src="{{ product.image_url }}" width="300">
{% endif %}

<p>{{ product.description }}</p>
<p><strong>Price:</strong> ${{ product.price }}</p>

<a href="{% url 'add_to_cart' product.id %}">Add to Cart</a>
<a href="{% url 'home' %}">Back</a>
